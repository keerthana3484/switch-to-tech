<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Preview — Switch To Tech</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
    font-family: system-ui, sans-serif;
  }
  .label {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .phone-frame {
    width: 393px;
    background: #000;
    border-radius: 54px;
    padding: 14px;
    box-shadow:
      0 0 0 2px #333,
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 0 0 2px #222;
    position: relative;
  }
  .phone-notch {
    width: 126px;
    height: 34px;
    background: #000;
    border-radius: 0 0 22px 22px;
    margin: 0 auto 10px;
    position: relative;
    z-index: 10;
  }
  .phone-screen {
    width: 365px;
    height: 790px;
    border-radius: 44px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  iframe {
    width: 390px;
    height: 844px;
    border: none;
    transform: scale(0.9359);
    transform-origin: top left;
    margin-left: -13px;
    margin-top: -27px;
  }
  .controls {
    margin-top: 28px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    background: #2a2a4a;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls button:hover { background: #3a3a6a; color: #fff; }
  .device-label {
    color: #666;
    font-size: 12px;
    margin-top: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="label">📱 Mobile Preview — 390 × 844 (iPhone 14)</div>

<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <iframe src="index.html" title="Mobile Preview"></iframe>
  </div>
</div>

<div class="controls">
  <button onclick="setDevice(390,844)">iPhone 14</button>
  <button onclick="setDevice(414,896)">iPhone 11 Pro Max</button>
  <button onclick="setDevice(360,800)">Android (360px)</button>
  <button onclick="setDevice(412,915)">Pixel 7</button>
</div>

<div class="device-label" id="deviceLabel">390 × 844 px</div>

<script>
function setDevice(w, h) {
  const iframe = document.querySelector('iframe');
  const screen = document.querySelector('.phone-screen');
  const scale = 365 / w;
  iframe.style.width = w + 'px';
  iframe.style.height = h + 'px';
  iframe.style.transform = `scale(${scale})`;
  iframe.style.marginLeft = `-${(w - 365) / 2}px`;
  screen.style.height = Math.round(h * scale) + 'px';
  document.getElementById('deviceLabel').textContent = `${w} × ${h} px`;
}
</script>

</body>
</html>
